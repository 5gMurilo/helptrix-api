basePath: /
definitions:
  domain.AddressInputDTO:
    properties:
      city:
        type: string
      complement:
        type: string
      neighborhood:
        type: string
      number:
        type: string
      state:
        type: string
      street:
        type: string
    required:
    - city
    - neighborhood
    - number
    - state
    - street
    type: object
  domain.AddressUpdateDTO:
    properties:
      city:
        type: string
      complement:
        type: string
      neighborhood:
        type: string
      number:
        type: string
      state:
        type: string
      street:
        type: string
    type: object
  domain.CategoryListItemResponseDTO:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  domain.CreateProposalRequestDTO:
    properties:
      category_id:
        type: integer
      description:
        type: string
      helper_id:
        type: string
      value:
        type: number
    required:
    - category_id
    - description
    - helper_id
    - value
    type: object
  domain.CreateServiceRequestDTO:
    properties:
      actuation_days:
        items:
          type: string
        minItems: 1
        type: array
      category_id:
        type: integer
      description:
        type: string
      end_time:
        type: string
      name:
        type: string
      offer_since:
        type: string
      photos:
        items:
          type: string
        type: array
      start_time:
        type: string
      value:
        type: string
    required:
    - actuation_days
    - category_id
    - description
    - end_time
    - name
    - offer_since
    - start_time
    - value
    type: object
  domain.GetProfileResponseDTO:
    properties:
      address:
        $ref: '#/definitions/domain.ProfileAddressDTO'
      biography:
        type: string
      categories:
        items:
          $ref: '#/definitions/domain.ProfileCategoryDTO'
        type: array
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      phone:
        type: string
      profile_picture:
        type: string
      reviews:
        items: {}
        type: array
      services:
        items:
          $ref: '#/definitions/domain.ServiceResponseDTO'
        type: array
      user_type:
        type: string
    type: object
  domain.LoginRequestDTO:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  domain.LoginResponseDTO:
    properties:
      token:
        type: string
    type: object
  domain.ProfileAddressDTO:
    properties:
      city:
        type: string
      complement:
        type: string
      neighborhood:
        type: string
      number:
        type: string
      state:
        type: string
      street:
        type: string
    type: object
  domain.ProfileCategoryDTO:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  domain.ProposalResponseDTO:
    properties:
      category_id:
        type: integer
      created_at:
        type: string
      description:
        type: string
      helper_id:
        type: string
      id:
        type: string
      status:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
      value:
        type: number
    type: object
  domain.RegisterRequestDTO:
    properties:
      address:
        $ref: '#/definitions/domain.AddressInputDTO'
      categories:
        items:
          type: integer
        minItems: 1
        type: array
      document:
        type: string
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
      phone:
        type: string
      user_type:
        type: string
    required:
    - address
    - categories
    - document
    - email
    - name
    - password
    - phone
    - user_type
    type: object
  domain.RegisterResponseDTO:
    properties:
      categories:
        items:
          type: integer
        type: array
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      user_type:
        type: string
    type: object
  domain.ServiceCategoryDTO:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  domain.ServiceResponseDTO:
    properties:
      actuation_days:
        items:
          type: string
        type: array
      category:
        $ref: '#/definitions/domain.ServiceCategoryDTO'
      description:
        type: string
      end_time:
        type: string
      id:
        type: string
      name:
        type: string
      offer_since:
        type: string
      photos:
        items:
          type: string
        type: array
      start_time:
        type: string
      value:
        type: number
    type: object
  domain.UpdateProfileRequestDTO:
    properties:
      address:
        $ref: '#/definitions/domain.AddressUpdateDTO'
      biography:
        type: string
      categories:
        items:
          type: integer
        type: array
      email:
        type: string
      phone:
        type: string
      profile_picture:
        type: string
    type: object
  domain.UpdateProposalStatusRequestDTO:
    properties:
      status:
        type: string
    required:
    - status
    type: object
  domain.UpdateServiceRequestDTO:
    properties:
      actuation_days:
        items:
          type: string
        type: array
      category_id:
        type: integer
      description:
        type: string
      end_time:
        type: string
      name:
        type: string
      offer_since:
        type: string
      photos:
        items:
          type: string
        type: array
      start_time:
        type: string
      value:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: REST API for the Helptrix helper marketplace platform.
  title: Helptrix API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user by email and password, returns a Paseto token
      parameters:
      - description: Login request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.LoginRequestDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.LoginResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Authenticate user
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a helper or business user with address and categories
      parameters:
      - description: Register request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.RegisterRequestDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.RegisterResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - auth
  /category:
    get:
      description: Returns all categories available on the platform (public catalog)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.CategoryListItemResponseDTO'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List categories
      tags:
      - category
  /image-uploader/{image-type}/{id}:
    post:
      consumes:
      - multipart/form-data
      description: Uploads an image file to the storage. Supports profile-images and
        service-images types.
      parameters:
      - description: Image type (profile-images | service-images)
        in: path
        name: image-type
        required: true
        type: string
      - description: Owner ID
        in: path
        name: id
        required: true
        type: string
      - description: Image file
        in: formData
        name: image
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
        "501":
          description: Not Implemented
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Upload an image
      tags:
      - image-uploader
  /proposal:
    get:
      consumes:
      - application/json
      description: Lists proposals for the authenticated user. Business users see
        proposals they created; helpers see proposals directed at them. Supports optional
        status filter.
      parameters:
      - description: Filter by proposal status (pending, accepted, refused, in progress,
          cancelled, finished)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.ProposalResponseDTO'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List proposals
      tags:
      - proposal
    post:
      consumes:
      - application/json
      description: Creates a new service proposal from a business user directed at
        a helper. Only business users can create proposals.
      parameters:
      - description: Create proposal request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.CreateProposalRequestDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.ProposalResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a proposal
      tags:
      - proposal
  /proposal/{id}:
    get:
      consumes:
      - application/json
      description: Returns a proposal by ID. Only participants (business owner or
        helper) can access it.
      parameters:
      - description: Proposal ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.ProposalResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get proposal by ID
      tags:
      - proposal
  /proposal/{id}/status:
    patch:
      consumes:
      - application/json
      description: Updates the status of a proposal following the allowed state machine
        transitions. Helpers manage most transitions; both parties can cancel.
      parameters:
      - description: Proposal ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Update status request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.UpdateProposalStatusRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.ProposalResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update proposal status
      tags:
      - proposal
  /service:
    get:
      description: Lists all services for the authenticated helper user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.ServiceResponseDTO'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List services
      tags:
      - service
    post:
      consumes:
      - application/json
      description: Creates a new service offering for the authenticated helper user
      parameters:
      - description: Create service request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.CreateServiceRequestDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.ServiceResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a service
      tags:
      - service
  /service/{id}:
    delete:
      description: Soft-deletes a service for the authenticated helper user
      parameters:
      - description: Service ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a service
      tags:
      - service
    get:
      description: Returns a specific service by its ID for the authenticated helper
        user
      parameters:
      - description: Service ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.ServiceResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get service by ID
      tags:
      - service
    put:
      consumes:
      - application/json
      description: Updates fields of an existing service for the authenticated helper
        user
      parameters:
      - description: Service ID
        in: path
        name: id
        required: true
        type: string
      - description: Update service request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.UpdateServiceRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.ServiceResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update a service
      tags:
      - service
  /user/profile/{id}:
    delete:
      consumes:
      - application/json
      description: Soft-deletes a user profile. Only the owner can delete.
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete user profile
      tags:
      - user
    get:
      consumes:
      - application/json
      description: Returns a user profile by ID, with optional filters for business
        users
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Filter services by category ID (business only)
        in: query
        name: category_id
        type: integer
      - description: Filter services by actuation day (business only)
        in: query
        name: actuation_day
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.GetProfileResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get user profile
      tags:
      - user
    put:
      consumes:
      - application/json
      description: Updates mutable fields of a user profile. Only the owner can update.
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Update profile request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.UpdateProfileRequestDTO'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update user profile
      tags:
      - user
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
