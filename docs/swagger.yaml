basePath: /
definitions:
  domain.AddressInputDTO:
    properties:
      city:
        type: string
      complement:
        type: string
      neighborhood:
        type: string
      number:
        type: string
      state:
        type: string
      street:
        type: string
      zip_code:
        type: string
    required:
    - city
    - neighborhood
    - number
    - state
    - street
    - zip_code
    type: object
  domain.AddressUpdateDTO:
    properties:
      city:
        type: string
      complement:
        type: string
      neighborhood:
        type: string
      number:
        type: string
      state:
        type: string
      street:
        type: string
      zip_code:
        type: string
    type: object
  domain.CategoryListItemResponseDTO:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  domain.ConfirmOTPRequestDTO:
    properties:
      code:
        type: string
      id:
        type: string
    required:
    - code
    - id
    type: object
  domain.ConfirmOTPResponseDTO:
    properties:
      message:
        type: string
    type: object
  domain.CreateProposalRequestDTO:
    properties:
      category_id:
        type: integer
      description:
        type: string
      helper_id:
        type: string
      value:
        type: number
    required:
    - category_id
    - description
    - helper_id
    - value
    type: object
  domain.CreateReviewRequestDTO:
    properties:
      helper_id:
        type: string
      proposal_id:
        type: string
      rate:
        maximum: 5
        minimum: 1
        type: integer
      review:
        type: string
      service_type:
        type: string
    required:
    - helper_id
    - proposal_id
    - rate
    - review
    - service_type
    type: object
  domain.CreateServiceRequestDTO:
    properties:
      actuation_days:
        items:
          type: string
        minItems: 1
        type: array
      category_id:
        type: integer
      description:
        type: string
      end_time:
        type: string
      name:
        type: string
      offer_since:
        type: string
      photos:
        items:
          type: string
        type: array
      start_time:
        type: string
      value:
        type: string
    required:
    - actuation_days
    - category_id
    - description
    - end_time
    - name
    - offer_since
    - start_time
    - value
    type: object
  domain.GetProfileResponseDTO:
    properties:
      address:
        $ref: '#/definitions/domain.ProfileAddressDTO'
      biography:
        type: string
      categories:
        items:
          $ref: '#/definitions/domain.ProfileCategoryDTO'
        type: array
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      phone:
        type: string
      profile_picture:
        type: string
      reviews:
        items:
          $ref: '#/definitions/domain.ReviewListResponseDTO'
        type: array
      services:
        items:
          $ref: '#/definitions/domain.ServiceResponseDTO'
        type: array
      user_type:
        type: string
    type: object
  domain.HelperCardDTO:
    properties:
      biography:
        type: string
      categories:
        items:
          $ref: '#/definitions/domain.HelperCategoryDTO'
        type: array
      city:
        type: string
      id:
        type: string
      name:
        type: string
      profile_picture:
        type: string
      state:
        type: string
    type: object
  domain.HelperCategoryDTO:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  domain.HelperListResponseDTO:
    properties:
      data:
        items:
          $ref: '#/definitions/domain.HelperCardDTO'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  domain.LoginRequestDTO:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  domain.LoginResponseDTO:
    properties:
      id:
        type: string
      token:
        type: string
    type: object
  domain.ProfileAddressDTO:
    properties:
      city:
        type: string
      complement:
        type: string
      neighborhood:
        type: string
      number:
        type: string
      state:
        type: string
      street:
        type: string
    type: object
  domain.ProfileCategoryDTO:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  domain.ProposalResponseDTO:
    properties:
      category_id:
        type: integer
      created_at:
        type: string
      description:
        type: string
      helper_id:
        type: string
      id:
        type: string
      status:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
      value:
        type: number
    type: object
  domain.RegisterRequestDTO:
    properties:
      address:
        $ref: '#/definitions/domain.AddressInputDTO'
      categories:
        items:
          type: integer
        minItems: 1
        type: array
      document:
        type: string
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
      phone:
        type: string
      user_type:
        type: string
    required:
    - address
    - categories
    - document
    - email
    - name
    - password
    - phone
    - user_type
    type: object
  domain.RegisterResponseDTO:
    properties:
      categories:
        items:
          type: integer
        type: array
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      user_type:
        type: string
    type: object
  domain.ReviewListResponseDTO:
    properties:
      created_at:
        type: string
      rate:
        type: integer
      review:
        type: string
      service_type:
        type: string
    type: object
  domain.SendOTPRequestDTO:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  domain.SendOTPResponseDTO:
    properties:
      id:
        type: string
      message:
        type: string
    type: object
  domain.ServiceCategoryDTO:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  domain.ServiceResponseDTO:
    properties:
      actuation_days:
        items:
          type: string
        type: array
      category:
        $ref: '#/definitions/domain.ServiceCategoryDTO'
      description:
        type: string
      end_time:
        type: string
      id:
        type: string
      name:
        type: string
      offer_since:
        type: string
      photos:
        items:
          type: string
        type: array
      start_time:
        type: string
      value:
        type: number
    type: object
  domain.UpdateProfileRequestDTO:
    properties:
      address:
        $ref: '#/definitions/domain.AddressUpdateDTO'
      biography:
        type: string
      categories:
        items:
          type: integer
        type: array
      email:
        type: string
      phone:
        type: string
      profile_picture:
        type: string
    type: object
  domain.UpdateProposalStatusRequestDTO:
    properties:
      status:
        type: string
    required:
    - status
    type: object
  domain.UpdateServiceRequestDTO:
    properties:
      actuation_days:
        items:
          type: string
        type: array
      category_id:
        type: integer
      description:
        type: string
      end_time:
        type: string
      name:
        type: string
      offer_since:
        type: string
      photos:
        items:
          type: string
        type: array
      start_time:
        type: string
      value:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: REST API for the Helptrix helper marketplace platform.
  title: Helptrix API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user by email and password, returns a Paseto token
      parameters:
      - description: Login request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.LoginRequestDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.LoginResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Authenticate user
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a helper or business user with address and categories
      parameters:
      - description: Register request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.RegisterRequestDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.RegisterResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - auth
  /category:
    get:
      description: Returns all categories available on the platform (public catalog)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.CategoryListItemResponseDTO'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List categories
      tags:
      - category
  /helper:
    get:
      consumes:
      - application/json
      description: Returns a paginated list of helper-type users. Supports optional
        filtering by name (substring) and category ID. Restricted to business users.
      parameters:
      - description: Substring match on helper name (case-insensitive)
        in: query
        name: name
        type: string
      - description: Filter helpers by assigned category ID
        in: query
        name: category_id
        type: integer
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Results per page (default: 20)'
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.HelperListResponseDTO'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List and search helpers
      tags:
      - helper
  /image-uploader/{image-type}/{id}:
    post:
      consumes:
      - multipart/form-data
      description: Uploads an image file to the storage. Supports profile-images and
        service-images types.
      parameters:
      - description: Image type (profile-images | service-images)
        in: path
        name: image-type
        required: true
        type: string
      - description: User ID (profile-images) or service ID (service-images)
        in: path
        name: id
        required: true
        type: string
      - description: Image file
        in: formData
        name: image
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Upload an image
      tags:
      - image-uploader
  /otp/confirm:
    post:
      consumes:
      - application/json
      description: Validates the submitted 4-digit OTP code and marks it as confirmed
      parameters:
      - description: Confirm OTP request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.ConfirmOTPRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.ConfirmOTPResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Confirm OTP
      tags:
      - otp
  /otp/send:
    post:
      consumes:
      - application/json
      description: Generates a 4-digit OTP, invalidates any existing waiting OTP for
        the email, and delivers it by email
      parameters:
      - description: Send OTP request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.SendOTPRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.SendOTPResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Send OTP
      tags:
      - otp
  /proposal:
    get:
      consumes:
      - application/json
      description: Lists proposals for the authenticated user. Business users see
        proposals they created; helpers see proposals directed at them. Supports optional
        status filter.
      parameters:
      - description: Filter by proposal status (pending, accepted, refused, in progress,
          cancelled, finished)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.ProposalResponseDTO'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List proposals
      tags:
      - proposal
    post:
      consumes:
      - application/json
      description: Creates a new service proposal from a business user directed at
        a helper. Only business users can create proposals.
      parameters:
      - description: Create proposal request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.CreateProposalRequestDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.ProposalResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a proposal
      tags:
      - proposal
  /proposal/{id}:
    get:
      consumes:
      - application/json
      description: Returns a proposal by ID. Only participants (business owner or
        helper) can access it.
      parameters:
      - description: Proposal ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.ProposalResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get proposal by ID
      tags:
      - proposal
  /proposal/{id}/status:
    patch:
      consumes:
      - application/json
      description: Updates the status of a proposal following the allowed state machine
        transitions. Helpers manage most transitions; both parties can cancel.
      parameters:
      - description: Proposal ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Update status request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.UpdateProposalStatusRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.ProposalResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update proposal status
      tags:
      - proposal
  /review:
    post:
      consumes:
      - application/json
      description: Business user creates a review for a helper after service completion
      parameters:
      - description: Create review request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.CreateReviewRequestDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create review
      tags:
      - review
  /review/business:
    get:
      consumes:
      - application/json
      description: Returns all reviews created by the authenticated business user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.ReviewListResponseDTO'
            type: array
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List reviews made by business
      tags:
      - review
  /review/helper:
    get:
      consumes:
      - application/json
      description: Returns all reviews received by the authenticated helper user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.ReviewListResponseDTO'
            type: array
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List reviews received by helper
      tags:
      - review
  /service:
    get:
      description: Lists all services for the authenticated helper user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.ServiceResponseDTO'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List services
      tags:
      - service
    post:
      consumes:
      - application/json
      description: Creates a new service offering for the authenticated helper user
      parameters:
      - description: Create service request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.CreateServiceRequestDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.ServiceResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a service
      tags:
      - service
  /service/{id}:
    delete:
      description: Soft-deletes a service for the authenticated helper user
      parameters:
      - description: Service ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a service
      tags:
      - service
    get:
      description: Returns a specific service by its ID for the authenticated helper
        user
      parameters:
      - description: Service ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.ServiceResponseDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
